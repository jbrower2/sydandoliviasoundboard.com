<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/webp" href="logo.jpg">
<title>Syd & Olivia Soundboard</title>
<style>
  :root {
    --bg: #0e0e10;
    --fg: #f4f4f5;
    --accent: #ff5e5b;
    --button: #1f1f23;
    --button-hover: #2c2c33;
    --border: #2a2a30;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  header {
    text-align: center;
    margin-bottom: 2rem;
  }
  h1 {
    margin: 0 0 0.5rem;
    font-size: 2rem;
    letter-spacing: -0.02em;
  }
  .submissions {
    display: inline-block;
    margin-top: 0.5rem;
    margin-left: 0.5rem;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid var(--accent);
    padding: 0.4rem 0.9rem;
    border-radius: 999px;
    font-size: 0.9rem;
  }
  .submissions:hover { background: var(--accent); color: var(--bg); }
  .filter {
    max-width: 1100px;
    margin: 0 auto 1rem;
    display: block;
  }
  .filter input {
    width: 100%;
    background: var(--button);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem 1rem;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .filter input:focus { border-color: var(--accent); }
  .filter input::placeholder { color: #777; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.75rem;
    max-width: 1100px;
    margin: 0 auto;
  }
  button.sound.hidden { display: none; }
  button.sound {
    background: var(--button);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1rem;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
    text-align: center;
    line-height: 1.3;
  }
  button.sound:hover { background: var(--button-hover); }
  button.sound:active { transform: scale(0.98); }
  button.sound.playing {
    border-color: var(--accent);
    background: var(--button-hover);
  }
  @keyframes wiggle {
    0%   { transform: rotate(-0.8deg); }
    50%  { transform: rotate(0.8deg);  }
    100% { transform: rotate(-0.8deg); }
  }
  body.edit button.sound {
    animation: wiggle 0.25s ease-in-out infinite;
    cursor: grab;
  }
  body.edit button.sound:active { cursor: grabbing; }
  body.edit button.sound.dragging {
    opacity: 0.4;
    animation: none;
  }
  body.edit button.sound.drop-before {
    box-shadow: -3px 0 0 0 var(--accent);
  }
  body.edit button.sound.drop-after {
    box-shadow: 3px 0 0 0 var(--accent);
  }
  footer {
    text-align: center;
    margin-top: 3rem;
    color: #777;
    font-size: 0.85rem;
  }
  .edit-toggle {
    background: transparent;
    color: #777;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.4rem 0.9rem;
    font-size: 0.85rem;
    cursor: pointer;
    margin-left: 0.5rem;
  }
  .edit-toggle:hover { color: var(--fg); border-color: #555; }
  body.edit #editToggle {
    color: #4ade80;
    border-color: #4ade80;
  }
  body.edit #editToggle:hover {
    color: #0e0e10;
    background: #4ade80;
    border-color: #4ade80;
  }
</style>
</head>
<body>
<header>
  <h1>Syd & Olivia Soundboard</h1>
</header>

<div class="filter">
  <input id="filter" type="search" placeholder="filter sounds..." autocomplete="off">
</div>

<main class="grid" id="board"></main>

<footer>
  <a class="submissions" href="https://forms.gle/ybRJbNfdX1sgtsDM6" target="_blank">submissions</a>
  <a class="submissions" href="https://www.patreon.com/c/syd_and_olivia" target="_blank">patreon</a>
  <a class="submissions" href="https://github.com/jbrower2/sydandoliviasoundboard.com/blob/main/index.html" target="_blank">sources</a>
  <button class="edit-toggle" id="modeToggle" type="button">multiple</button>
  <button class="edit-toggle" id="editToggle" type="button">rearrange</button>
  <button class="edit-toggle" id="resetOrder" type="button" hidden>reset order</button>
</footer>

<script>
  const sounds = [
    "the music",                       // 2021-09
    "olivia for you",                  // 2024-11-05 - s3e05 - EMOTIONAL SPA DAY                  - 42:37 - https://www.youtube.com/watch?v=JrucdBB4qs0
    "olivia what is spreadsheet",      // 2025-01-22 - POV: Inside Your Brain                     -  4:05 - https://www.youtube.com/watch?v=IhiS54TmrC4
    "syd what is spreadsheet",         // 2025-01-22 - POV: Inside Your Brain                     -  4:06 - https://www.youtube.com/watch?v=IhiS54TmrC4
    "syd and ive always said that",    // 2025-06-10 - s3e35 - A Big Podcast MOMENT!              - 15:58 - https://www.youtube.com/watch?v=Z8BowUIcB6U
    "olivia and ive always said that", // 2025-06-10 - s3e35 - A Big Podcast MOMENT!              - 16:38 - https://www.youtube.com/watch?v=Z8BowUIcB6U
    "joey and ive always said that",   // 2025-06-10 - s3e35 - A Big Podcast MOMENT!              - 17:37 - https://www.youtube.com/watch?v=Z8BowUIcB6U
    "syd for you",                     // 2025-06-24 - s3e37 - A Happy Wife Happy Life Love Story -  0:36 - https://www.youtube.com/watch?v=Nzpf9INj3zE
    "syd is this anything",            // 2026-04-21 - s3e80 - We've Been Misgendering Bigfoot    - 44:24 - https://www.youtube.com/watch?v=9n4o99mWezA
  ];

  const board = document.getElementById("board");
  const filter = document.getElementById("filter");
  const editToggle = document.getElementById("editToggle");
  const resetBtn = document.getElementById("resetOrder");
  const modeToggle = document.getElementById("modeToggle");
  const STORAGE_KEY = "soundOrder";
  const MODE_KEY = "playMode";
  const buttons = [];
  const playing = new Set();
  let mode = "multiple";
  try {
    const saved = localStorage.getItem(MODE_KEY);
    if (saved === "single" || saved === "multiple") mode = saved;
  } catch {}
  modeToggle.textContent = mode;

  function loadOrder() {
    let saved = null;
    try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch {}
    if (!Array.isArray(saved)) return sounds.slice();
    const set = new Set(sounds);
    const kept = saved.filter(s => set.has(s));
    const keptSet = new Set(kept);
    const missing = sounds.filter(s => !keptSet.has(s));
    const order = kept.concat(missing);
    if (order.length !== saved.length || missing.length) saveOrder(order);
    return order;
  }
  function saveOrder(order) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(order)); } catch {}
    updateResetVisibility();
  }
  function updateResetVisibility() {
    let has = false;
    try { has = localStorage.getItem(STORAGE_KEY) !== null; } catch {}
    resetBtn.hidden = !has;
  }
  function currentOrder() {
    return Array.from(board.children).map(b => b.textContent);
  }

  loadOrder().forEach(file => {
    const audio = new Audio(encodeURIComponent(file + ".mp3"));
    audio.preload = "none";

    const btn = document.createElement("button");
    btn.className = "sound";
    btn.textContent = file;
    btn.style.animationDelay = (Math.random() * -0.25) + "s";
    buttons.push(btn);
    const entry = { audio, btn };
    btn.addEventListener("click", () => {
      if (document.body.classList.contains("edit")) return;
      if (!audio.paused) {
        audio.pause();
        audio.currentTime = 0;
        btn.classList.remove("playing");
        playing.delete(entry);
      } else {
        if (mode === "single") {
          playing.forEach(p => {
            p.audio.pause();
            p.audio.currentTime = 0;
            p.btn.classList.remove("playing");
          });
          playing.clear();
        }
        audio.play();
        btn.classList.add("playing");
        playing.add(entry);
      }
    });
    audio.addEventListener("ended", () => {
      btn.classList.remove("playing");
      playing.delete(entry);
    });

    btn.addEventListener("dragstart", e => {
      if (!document.body.classList.contains("edit")) { e.preventDefault(); return; }
      btn.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", file);
    });
    btn.addEventListener("dragend", () => {
      btn.classList.remove("dragging");
      buttons.forEach(b => b.classList.remove("drop-before", "drop-after"));
    });
    btn.addEventListener("dragover", e => {
      if (!document.body.classList.contains("edit")) return;
      const dragging = board.querySelector(".dragging");
      if (!dragging || dragging === btn) return;
      e.preventDefault();
      const rect = btn.getBoundingClientRect();
      const after = (e.clientX - rect.left) > rect.width / 2;
      buttons.forEach(b => b.classList.remove("drop-before", "drop-after"));
      btn.classList.add(after ? "drop-after" : "drop-before");
    });
    btn.addEventListener("drop", e => {
      if (!document.body.classList.contains("edit")) return;
      e.preventDefault();
      const dragging = board.querySelector(".dragging");
      if (!dragging || dragging === btn) return;
      const rect = btn.getBoundingClientRect();
      const after = (e.clientX - rect.left) > rect.width / 2;
      board.insertBefore(dragging, after ? btn.nextSibling : btn);
      buttons.forEach(b => b.classList.remove("drop-before", "drop-after"));
    });

    board.appendChild(btn);
  });

  filter.addEventListener("input", () => {
    const q = filter.value.trim().toLowerCase();
    buttons.forEach(btn => {
      btn.classList.toggle("hidden", q && !btn.textContent.toLowerCase().includes(q));
    });
  });

  editToggle.addEventListener("click", () => {
    const on = document.body.classList.toggle("edit");
    if (on) {
      editToggle.textContent = "save";
    } else {
      saveOrder(currentOrder());
      editToggle.textContent = "rearrange";
    }
    buttons.forEach(b => b.draggable = on);
  });

  resetBtn.addEventListener("click", () => {
    if (!confirm("Reset to the default order?")) return;
    try { localStorage.removeItem(STORAGE_KEY); } catch {}
    const byName = new Map(buttons.map(b => [b.textContent, b]));
    sounds.forEach(name => {
      const b = byName.get(name);
      if (b) board.appendChild(b);
    });
    updateResetVisibility();
  });

  updateResetVisibility();

  modeToggle.addEventListener("click", () => {
    mode = mode === "multiple" ? "single" : "multiple";
    modeToggle.textContent = mode;
    try { localStorage.setItem(MODE_KEY, mode); } catch {}
    if (mode === "single" && playing.size > 1) {
      const keep = Array.from(playing).pop();
      Array.from(playing).forEach(p => {
        if (p === keep) return;
        p.audio.pause();
        p.audio.currentTime = 0;
        p.btn.classList.remove("playing");
        playing.delete(p);
      });
    }
  });
</script>
</body>
</html>
